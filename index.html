<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Powder Idle Codex</title>
    <style>
      @font-face {
        font-family: 'Cinzel';
        src: url('./Assets/Font/Cinzel/Cinzel-VariableFont_wght.ttf') format('truetype');
        font-weight: 400 900;
        font-style: normal;
        font-display: swap;
      }
      body {
        margin: 0;
        padding: 12px;
        background: #0f0e11;
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        min-height: 100vh;
        min-width: 100vw;
        box-sizing: border-box;
        font-family: 'Cinzel', serif;
        color: #e6dfea;
        letter-spacing: 0.025em;
      }
      canvas {
        display: block;
        margin: 0;
        max-width: 100%;
        max-height: 100%;
        box-shadow: 0 24px 54px rgba(8, 7, 9, 0.82), 0 0 0 1px rgba(202, 181, 229, 0.18);
        border-radius: 0;
        image-rendering: pixelated;
      }
      noscript {
        max-width: 460px;
        text-align: center;
        line-height: 1.6;
        padding: 24px;
        border-radius: 0;
        background: rgba(28, 25, 32, 0.96);
        color: #e6dfea;
        box-shadow: 0 18px 42px rgba(8, 7, 9, 0.72);
      }
    </style>
  </head>
  <body>
    <noscript>
      Powder Idle requires JavaScript to render its atelier. Enable JavaScript to
      begin weaving powders, automate production, and unlock the codex.
    </noscript>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
