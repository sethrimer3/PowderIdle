<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Powder Idle Codex</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
      crossorigin
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 12px;
        background: #050a16;
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        min-height: 100vh;
        min-width: 100vw;
        box-sizing: border-box;
        font-family: 'Press Start 2P', monospace;
        color: #e2e8f0;
        letter-spacing: 0.04em;
      }
      canvas {
        display: block;
        margin: 0;
        max-width: 100%;
        max-height: 100%;
        box-shadow: 0 12px 48px rgba(8, 13, 26, 0.6);
        border-radius: 8px;
        image-rendering: pixelated;
      }
      noscript {
        max-width: 460px;
        text-align: center;
        line-height: 1.6;
        padding: 24px;
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.85);
        box-shadow: 0 10px 32px rgba(2, 6, 23, 0.6);
      }
    </style>
  </head>
  <body>
    <noscript>
      Powder Idle requires JavaScript to render its atelier. Enable JavaScript to
      begin weaving powders, automate production, and unlock the codex.
    </noscript>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
