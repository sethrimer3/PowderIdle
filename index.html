<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Powder Idle Codex</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
      crossorigin
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 12px;
        background: #f6f0e3;
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        min-height: 100vh;
        min-width: 100vw;
        box-sizing: border-box;
        font-family: 'Nunito', sans-serif;
        color: #2f2a1f;
        letter-spacing: 0.01em;
        background-image: radial-gradient(circle at 20% 20%, #fff8ec, transparent 45%),
          radial-gradient(circle at 80% 10%, #f3ead4, transparent 50%);
      }
      canvas {
        display: block;
        margin: 0;
        max-width: 100%;
        max-height: 100%;
        box-shadow: 0 18px 40px rgba(149, 118, 72, 0.2);
        border-radius: 16px;
        image-rendering: pixelated;
      }
      noscript {
        max-width: 460px;
        text-align: center;
        line-height: 1.6;
        padding: 24px;
        border-radius: 12px;
        background: rgba(255, 252, 245, 0.9);
        color: #2f2a1f;
        box-shadow: 0 12px 36px rgba(149, 118, 72, 0.18);
      }
    </style>
  </head>
  <body>
    <noscript>
      Powder Idle requires JavaScript to render its atelier. Enable JavaScript to
      begin weaving powders, automate production, and unlock the codex.
    </noscript>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
