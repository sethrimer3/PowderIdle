<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Powder Fall Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #111827;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      canvas {
        display: block;
        margin: auto;
        box-shadow: 0 12px 40px rgba(15, 23, 42, 0.45);
        border-radius: 18px;
      }
    </style>
  </head>
  <body>
    <script>
      // Game constants
      const BASE_SCREEN_W = 360;
      const BASE_SCREEN_H = 640;
      let SCREEN_W = BASE_SCREEN_W;
      let SCREEN_H = BASE_SCREEN_H;
      let MENU_H = SCREEN_H / 3;
      let POWDER_AREA_H = SCREEN_H - MENU_H;
      let powderSize = 6;
      let layoutScaleX = 1;
      let layoutScaleY = 1;
      let canvas;
      const BASE_FALL_SPEED = 2;
      const BASE_DROPPER_INTERVAL = 2000; // ms

      // Powder tiers
      const powderTypes = [
        { name: "Sand", color: "#e7c97a", dustValue: 1 },
        { name: "Stone", color: "#888888", dustValue: 6 },
        { name: "Diamond", color: "#3de6e1", dustValue: 30 },
        { name: "Void Crystal", color: "#c084fc", dustValue: 120 }
      ];

      const tierUnlockCosts = [10, 25, 80];
      const compressionRecipes = [
        { from: 0, to: 1, baseCost: 15, output: 1 },
        { from: 1, to: 2, baseCost: 10, output: 1 },
        { from: 2, to: 3, baseCost: 6, output: 1 }
      ];

      const upgradeConfigs = [
        {
          key: "gravity",
          name: "Gravity Well",
          description: "Powders fall 20% faster per level.",
          baseCost: 50,
          costMult: 2
        },
        {
          key: "refinery",
          name: "Refinery Vats",
          description: "Dust yield +35% per level.",
          baseCost: 80,
          costMult: 2.2
        },
        {
          key: "compressor",
          name: "Powder Compressor",
          description: "Unlocks compression recipes and improves efficiency.",
          baseCost: 120,
          costMult: 2.6
        }
      ];

      let powders = []; // {col, row, type, fallProgress, collected}
      let powderCounts = new Array(powderTypes.length).fill(0);
      let selectedPowder = 0;
      let tierUpgrades = new Array(powderTypes.length - 1).fill(false);
      let autoDroppers = new Array(powderTypes.length).fill(0);
      let dropperTimers = new Array(powderTypes.length).fill(0);
      let dust = 0;
      let totalDustEarned = 0;
      let crystalCores = 0;
      let totalPowderCollected = 0;
      let upgradesState = {
        gravity: 0,
        refinery: 0,
        compressor: 0
      };
      let buttons = [];
      const EDGE_HOLE_WIDTH = 2;
      let grid = [];
      let gridCols = 0;
      let gridRows = 0;

      function setup() {
        updateLayoutDimensions();
        canvas = createCanvas(SCREEN_W, SCREEN_H);
        rectMode(CENTER);
        textAlign(CENTER, CENTER);
        frameRate(60);
        refreshPowderGrid();
      }

      function windowResized() {
        updateLayoutDimensions(true);
        refreshPowderGrid(true);
      }

      function draw() {
        background(30);

        // Draw powder area
        fill(0);
        rect(SCREEN_W / 2, POWDER_AREA_H / 2, SCREEN_W, POWDER_AREA_H);

        updateAutoDroppers();
        updatePowders();
        renderPowders();
        drawMenu();
      }

      function updatePowders() {
        if (gridRows <= 0 || gridCols <= 0) return;
        rebuildGrid();
        let fallSpeed =
          BASE_FALL_SPEED * getGravityMultiplier() * (deltaTime / 16.67);
        let fallCells = fallSpeed / powderSize;
        for (let i = powders.length - 1; i >= 0; i--) {
          let p = powders[i];
          p.fallProgress = (p.fallProgress || 0) + fallCells;
          let moved = false;
          let removed = false;
          while (p.fallProgress >= 1 && !removed) {
            let moveResult = tryMovePowder(p, i);
            if (moveResult === 'removed') {
              removed = true;
              break;
            }
            if (moveResult) {
              p.fallProgress -= 1;
              moved = true;
            } else {
              p.fallProgress = 0;
              break;
            }
          }
          if (removed) {
            continue;
          }
          if (!moved) {
            if (p.row >= gridRows - 1) {
              if (isHoleColumn(p.col)) {
                grid[p.row][p.col] = false;
                collectPowder(p);
                powders.splice(i, 1);
              } else {
                collectPowder(p);
                p.fallProgress = 0;
              }
            } else if (grid[p.row + 1][p.col]) {
              collectPowder(p);
              p.fallProgress = 0;
            }
          }
        }
      }

      function renderPowders() {
        for (let p of powders) {
          fill(powderTypes[p.type].color);
          let x = (p.col + 0.5) * powderSize;
          let y = (p.row + 0.5) * powderSize;
          rect(x, y, powderSize, powderSize, 2);
        }
      }

      function collectPowder(powder) {
        if (powder.collected) return;
        powderCounts[powder.type]++;
        totalPowderCollected++;
        let dustGain = Math.round(
          powderTypes[powder.type].dustValue * getDustMultiplier()
        );
        dust += dustGain;
        totalDustEarned += dustGain;
        powder.collected = true;
      }

      function tryMovePowder(powder, index) {
        let currentRow = powder.row;
        let currentCol = powder.col;
        let nextRow = currentRow + 1;
        if (nextRow >= gridRows) {
          if (isHoleColumn(currentCol)) {
            grid[currentRow][currentCol] = false;
            collectPowder(powder);
            powders.splice(index, 1);
            return 'removed';
          }
          return false;
        }
        if (!grid[nextRow][currentCol]) {
          grid[currentRow][currentCol] = false;
          powder.row = nextRow;
          grid[powder.row][currentCol] = true;
          return true;
        }
        let directions = Math.random() < 0.5 ? [-1, 1] : [1, -1];
        for (let dir of directions) {
          let newCol = currentCol + dir;
          if (newCol < 0 || newCol >= gridCols) continue;
          if (!grid[nextRow][newCol]) {
            grid[currentRow][currentCol] = false;
            powder.row = nextRow;
            powder.col = newCol;
            grid[powder.row][powder.col] = true;
            return true;
          }
        }
        return false;
      }

      function isHoleColumn(col) {
        if (gridCols <= 0) return false;
        let width = Math.max(1, Math.min(Math.floor(gridCols / 8), EDGE_HOLE_WIDTH));
        width = Math.min(width, Math.floor(gridCols / 2));
        if (width <= 0) {
          return false;
        }
        return col < width || col >= gridCols - width;
      }

      function rebuildGrid() {
        for (let r = 0; r < gridRows; r++) {
          grid[r] = grid[r] || new Array(gridCols).fill(false);
          for (let c = 0; c < gridCols; c++) {
            grid[r][c] = false;
          }
        }
        for (let p of powders) {
          if (
            p.row >= 0 &&
            p.row < gridRows &&
            p.col >= 0 &&
            p.col < gridCols
          ) {
            grid[p.row][p.col] = true;
          }
        }
      }

      function refreshPowderGrid(rescale = false) {
        let prevCols = gridCols || 1;
        let prevRows = gridRows || 1;
        gridCols = Math.max(1, Math.floor(SCREEN_W / powderSize));
        gridRows = Math.max(1, Math.floor(POWDER_AREA_H / powderSize));
        grid = Array.from({ length: gridRows }, () =>
          new Array(gridCols).fill(false)
        );
        for (let p of powders) {
          if (rescale && (prevCols !== gridCols || prevRows !== gridRows)) {
            let colRatio = prevCols <= 1 ? 0 : p.col / (prevCols - 1);
            let rowRatio = prevRows <= 1 ? 0 : p.row / (prevRows - 1);
            p.col = Math.max(
              0,
              Math.min(gridCols - 1, Math.round(colRatio * (gridCols - 1)))
            );
            p.row = Math.max(
              0,
              Math.min(gridRows - 1, Math.round(rowRatio * (gridRows - 1)))
            );
          } else {
            p.col = Math.min(p.col, gridCols - 1);
            p.row = Math.min(p.row, gridRows - 1);
          }
          p.fallProgress = 0;
          if (gridRows > 0 && gridCols > 0) {
            grid[p.row][p.col] = true;
          }
        }
      }

      function getGravityMultiplier() {
        return 1 + upgradesState.gravity * 0.2 + crystalCores * 0.1;
      }

      function getDustMultiplier() {
        return 1 + upgradesState.refinery * 0.35 + crystalCores * 0.25;
      }

      function getCompressorEfficiency() {
        return upgradesState.compressor <= 0
          ? 0
          : 1 + upgradesState.compressor * 0.35;
      }

      function updateAutoDroppers() {
        for (let i = 0; i < autoDroppers.length; i++) {
          if (autoDroppers[i] <= 0) continue;
          if (!(i === 0 || tierUpgrades[i - 1])) continue;
          let baseInterval = BASE_DROPPER_INTERVAL / (1 + (autoDroppers[i] - 1) * 0.4);
          baseInterval /= 1 + upgradesState.gravity * 0.15 + crystalCores * 0.1;
          dropperTimers[i] -= deltaTime;
          if (dropperTimers[i] <= 0) {
            for (let d = 0; d < autoDroppers[i]; d++) {
              dropPowder(i);
            }
            dropperTimers[i] += Math.max(400, baseInterval);
          }
        }
      }

      function drawMenu() {
        fill(38, 50, 56);
        rect(SCREEN_W / 2, POWDER_AREA_H + MENU_H / 2, SCREEN_W, MENU_H);

        buttons = [];

        fill('#fff');
        textSize(scaledFont(14));
        text(
          `Dust: ${Math.floor(dust)} | Crystal Cores: ${crystalCores} | Total Powder: ${totalPowderCollected}`,
          SCREEN_W / 2,
          POWDER_AREA_H + scaledY(22)
        );

        drawPowderCounters();

        let rowY = POWDER_AREA_H + scaledY(68);
        rowY = drawPowderSelectRow(rowY);
        rowY = drawTierUpgradeRow(rowY);
        rowY = drawAutoDropperRow(rowY);
        rowY = drawUpgradeRows(rowY);
        rowY = drawCompressionRow(rowY);
        drawPrestigeRow(rowY + scaledY(6));
        drawDropButton();
      }

      function drawPowderCounters() {
        fill('#cfd8dc');
        textSize(scaledFont(12));
        let unlocked = getUnlockedIndices();
        let pieces = unlocked.map(
          (i) => `${powderTypes[i].name}: ${powderCounts[i]}`
        );
        text(pieces.join(' | '), SCREEN_W / 2, POWDER_AREA_H + scaledY(44));
      }

      function drawPowderSelectRow(y) {
        let indices = getUnlockedIndices();
        if (indices.length === 0) return y;
        let btnW = scaledX(90);
        let btnH = scaledY(32);
        let xs = getRowPositions(indices.length);
        textSize(scaledFont(13));
        for (let idx = 0; idx < indices.length; idx++) {
          let i = indices[idx];
          let x = xs[idx];
          fill(i === selectedPowder ? '#ffffff' : powderTypes[i].color);
          rect(x, y, btnW, btnH, 10);
          fill(i === selectedPowder ? powderTypes[i].color : '#222');
          text(powderTypes[i].name, x, y);
          buttons.push({
            action: 'selectPowder',
            index: i,
            x,
            y,
            w: btnW,
            h: btnH
          });
        }
        textSize(scaledFont(14));
        return y + scaledY(34);
      }

      function drawTierUpgradeRow(y) {
        let btnW = scaledX(110);
        let btnH = scaledY(30);
        let xs = getRowPositions(tierUnlockCosts.length);
        textSize(scaledFont(11));
        for (let i = 0; i < tierUnlockCosts.length; i++) {
          let x = xs[i];
          let cost = tierUnlockCosts[i];
          let canUpgrade = powderCounts[i] >= cost && !tierUpgrades[i];
          fill(canUpgrade ? '#4caf50' : '#546e7a');
          rect(x, y, btnW, btnH, 8);
          fill('#fff');
          text(
            tierUpgrades[i]
              ? `${powderTypes[i + 1].name} unlocked`
              : `Unlock ${powderTypes[i + 1].name} (-${cost})`,
            x,
            y
          );
          buttons.push({
            action: 'tierUpgrade',
            index: i,
            x,
            y,
            w: btnW,
            h: btnH
          });
        }
        textSize(scaledFont(14));
        return y + scaledY(34);
      }

      function drawAutoDropperRow(y) {
        let indices = getUnlockedIndices();
        if (indices.length === 0) return y;
        let btnW = scaledX(130);
        let btnH = scaledY(30);
        let xs = getRowPositions(indices.length);
        textSize(scaledFont(11));
        for (let idx = 0; idx < indices.length; idx++) {
          let i = indices[idx];
          let x = xs[idx];
          let cost = getDropperCost(i);
          let canBuy = dust >= cost;
          fill(canBuy ? '#009688' : '#455a64');
          rect(x, y, btnW, btnH, 8);
          fill('#fff');
          text(
            `Auto ${powderTypes[i].name}: ${autoDroppers[i]} (\u2212${cost})`,
            x,
            y
          );
          buttons.push({
            action: 'buyDropper',
            index: i,
            x,
            y,
            w: btnW,
            h: btnH
          });
        }
        textSize(scaledFont(14));
        return y + scaledY(34);
      }

      function drawUpgradeRows(y) {
        let columns = Math.min(3, upgradeConfigs.length);
        let btnW = scaledX(120);
        let btnH = scaledY(34);
        let rows = Math.ceil(upgradeConfigs.length / columns);
        textSize(scaledFont(10));
        for (let r = 0; r < rows; r++) {
          let start = r * columns;
          let end = Math.min(start + columns, upgradeConfigs.length);
          let count = end - start;
          let xs = getRowPositions(count);
          for (let c = 0; c < count; c++) {
            let config = upgradeConfigs[start + c];
            let level = upgradesState[config.key];
            let cost = getUpgradeCost(config);
            let canBuy = dust >= cost;
            let x = xs[c];
            let rowY = y + scaledY(r * 36);
            fill(canBuy ? '#8e24aa' : '#4a148c');
            rect(x, rowY, btnW, btnH, 8);
            fill('#fff');
            text(
              `${config.name} Lv.${level} (\u2212${cost})`,
              x,
              rowY - scaledY(8)
            );
            text(config.description, x, rowY + scaledY(6));
            buttons.push({
              action: 'buyUpgrade',
              key: config.key,
              x,
              y: rowY,
              w: btnW,
              h: btnH
            });
          }
        }
        textSize(scaledFont(14));
        return y + scaledY(rows * 36);
      }

      function drawCompressionRow(y) {
        if (upgradesState.compressor <= 0) {
          textSize(scaledFont(11));
          fill('#b0bec5');
          text(
            'Purchase the Powder Compressor to unlock conversion recipes.',
            SCREEN_W / 2,
            y
          );
          textSize(scaledFont(14));
          return y + scaledY(34);
        }

        let availableRecipes = compressionRecipes.filter((recipe) =>
          recipe.to === 0 ? true : tierUpgrades[recipe.to - 1]
        );
        if (availableRecipes.length === 0) {
          return y;
        }
        let btnW = scaledX(160);
        let btnH = scaledY(28);
        let xs = getRowPositions(availableRecipes.length);
        textSize(scaledFont(11));
        let efficiency = getCompressorEfficiency();
        for (let i = 0; i < availableRecipes.length; i++) {
          let recipe = availableRecipes[i];
          let cost = Math.max(2, Math.round(recipe.baseCost / efficiency));
          let x = xs[i];
          let canConvert = powderCounts[recipe.from] >= cost;
          fill(canConvert ? '#ff7043' : '#5d4037');
          rect(x, y, btnW, btnH, 8);
          fill('#fff');
          text(
            `${powderTypes[recipe.from].name} → ${powderTypes[recipe.to].name} (\u2212${cost} +${recipe.output})`,
            x,
            y
          );
          buttons.push({ action: 'compress', recipe, x, y, w: btnW, h: btnH });
        }
        textSize(scaledFont(14));
        return y + scaledY(34);
      }

      function drawPrestigeRow(y) {
        let btnW = scaledX(220);
        let btnH = scaledY(38);
        let gain = getPrestigeGain();
        let canPrestige = gain > 0;
        fill(canPrestige ? '#ffca28' : '#8d6e63');
        rect(SCREEN_W / 2, y, btnW, btnH, 10);
        fill('#222');
        textSize(scaledFont(12));
        text(`Crystallize (+${gain} cores)`, SCREEN_W / 2, y - scaledY(8));
        text(
          'Resets for permanent dust & gravity boosts.',
          SCREEN_W / 2,
          y + scaledY(8)
        );
        textSize(scaledFont(14));
        buttons.push({ action: 'prestige', x: SCREEN_W / 2, y, w: btnW, h: btnH });
      }

      function drawDropButton() {
        let btnW = scaledX(90);
        let btnH = scaledY(34);
        let dropX = SCREEN_W - scaledX(70);
        let dropY = POWDER_AREA_H + MENU_H - scaledY(40);
        fill('#1976d2');
        rect(dropX, dropY, btnW, btnH, 10);
        fill('#fff');
        text('Drop', dropX, dropY);
        buttons.push({ action: 'drop', x: dropX, y: dropY, w: btnW, h: btnH });
      }

      function mousePressed() {
        let handled = false;
        for (let btn of buttons) {
          if (
            mouseX > btn.x - btn.w / 2 &&
            mouseX < btn.x + btn.w / 2 &&
            mouseY > btn.y - btn.h / 2 &&
            mouseY < btn.y + btn.h / 2
          ) {
            handleAction(btn);
            handled = true;
            break;
          }
        }
        if (
          !handled &&
          mouseX >= 0 &&
          mouseX <= SCREEN_W &&
          mouseY >= 0 &&
          mouseY <= SCREEN_H
        ) {
          dropPowder(selectedPowder, mouseX);
        }
      }

      function handleAction(btn) {
        switch (btn.action) {
          case 'selectPowder':
            selectedPowder = btn.index;
            break;
          case 'tierUpgrade':
            unlockTier(btn.index);
            break;
          case 'drop':
            dropPowder(selectedPowder);
            break;
          case 'buyDropper':
            buyDropper(btn.index);
            break;
          case 'buyUpgrade':
            buyUpgrade(btn.key);
            break;
          case 'compress':
            compressPowder(btn.recipe);
            break;
          case 'prestige':
            performPrestige();
            break;
        }
      }

      function dropPowder(type, spawnX) {
        if (!(type === 0 || tierUpgrades[type - 1])) {
          return;
        }
        if (gridRows <= 0 || gridCols <= 0) {
          refreshPowderGrid();
        }
        let x =
          spawnX === undefined
            ? random(powderSize / 2, SCREEN_W - powderSize / 2)
            : constrain(spawnX, powderSize / 2, SCREEN_W - powderSize / 2);
        let col = constrain(Math.floor(x / powderSize), 0, gridCols - 1);
        if (grid.length === 0) {
          refreshPowderGrid();
        }
        if (grid[0] && grid[0][col]) {
          return;
        }
        let powder = {
          col,
          row: 0,
          type: type,
          fallProgress: 0,
          collected: false
        };
        powders.push(powder);
        if (grid[0]) {
          grid[0][col] = true;
        }
      }

      function unlockTier(index) {
        if (tierUpgrades[index]) return;
        let cost = tierUnlockCosts[index];
        if (powderCounts[index] >= cost) {
          powderCounts[index] -= cost;
          tierUpgrades[index] = true;
        }
      }

      function getDropperCost(index) {
        return Math.floor(40 * (index + 1) * Math.pow(1.7, autoDroppers[index]));
      }

      function buyDropper(index) {
        let cost = getDropperCost(index);
        if (dust >= cost) {
          dust -= cost;
          autoDroppers[index]++;
          dropperTimers[index] = 0;
        }
      }

      function getUpgradeCost(config) {
        let level = upgradesState[config.key];
        return Math.floor(config.baseCost * Math.pow(config.costMult, level));
      }

      function buyUpgrade(key) {
        let config = upgradeConfigs.find((u) => u.key === key);
        if (!config) return;
        let cost = getUpgradeCost(config);
        if (dust >= cost) {
          dust -= cost;
          upgradesState[key]++;
        }
      }

      function compressPowder(recipe) {
        if (upgradesState.compressor <= 0) return;
        if (!(recipe.to === 0 || tierUpgrades[recipe.to - 1])) return;
        let efficiency = getCompressorEfficiency();
        if (efficiency <= 0) return;
        let cost = Math.max(2, Math.round(recipe.baseCost / efficiency));
        if (powderCounts[recipe.from] >= cost) {
          powderCounts[recipe.from] -= cost;
          powderCounts[recipe.to] += recipe.output;
        }
      }

      function getPrestigeGain() {
        return Math.floor(Math.sqrt(totalDustEarned / 200));
      }

      function performPrestige() {
        let gain = getPrestigeGain();
        if (gain <= 0) return;
        crystalCores += gain;
        dust = 0;
        powders = [];
        powderCounts = new Array(powderTypes.length).fill(0);
        tierUpgrades = new Array(powderTypes.length - 1).fill(false);
        autoDroppers = new Array(powderTypes.length).fill(0);
        dropperTimers = new Array(powderTypes.length).fill(0);
        upgradesState.gravity = 0;
        upgradesState.refinery = 0;
        if (upgradesState.compressor > 0) {
          upgradesState.compressor = 1; // retain basic access to compression if purchased
        }
        selectedPowder = 0;
        refreshPowderGrid();
      }

      function getUnlockedIndices() {
        let unlocked = [];
        for (let i = 0; i < powderTypes.length; i++) {
          if (i === 0 || tierUpgrades[i - 1]) {
            unlocked.push(i);
          }
        }
        return unlocked;
      }

      function getRowPositions(count) {
        if (count <= 0) return [];
        let padding = scaledX(40);
        if (count === 1) {
          return [SCREEN_W / 2];
        }
        let available = SCREEN_W - padding * 2;
        let step = available / (count - 1);
        let xs = [];
        for (let i = 0; i < count; i++) {
          xs.push(padding + step * i);
        }
        return xs;
      }

      function scaledFont(value) {
        let scale = Math.min(layoutScaleX, layoutScaleY);
        return constrain(Math.round(value * scale), 12, 28);
      }

      function scaledX(value) {
        return value * layoutScaleX;
      }

      function scaledY(value) {
        return value * layoutScaleY;
      }

      function updateLayoutDimensions(resize = false) {
        let margin = 40;
        let availableWidth = Math.max(windowWidth - margin, BASE_SCREEN_W);
        let availableHeight = Math.max(windowHeight - margin, BASE_SCREEN_H);
        SCREEN_W = Math.round(
          Math.min(Math.max(availableWidth, BASE_SCREEN_W), 1280)
        );
        SCREEN_H = Math.round(
          Math.min(Math.max(availableHeight, BASE_SCREEN_H), 960)
        );
        MENU_H = Math.round(SCREEN_H * 0.35);
        POWDER_AREA_H = SCREEN_H - MENU_H;
        layoutScaleX = SCREEN_W / BASE_SCREEN_W;
        layoutScaleY = SCREEN_H / BASE_SCREEN_H;
        powderSize = Math.max(8, Math.round(Math.min(SCREEN_W, POWDER_AREA_H) / 50));
        if (resize && canvas) {
          resizeCanvas(SCREEN_W, SCREEN_H);
        }
      }

      function keyPressed() {
        if (key === ' ' || keyCode === 32) {
          dropPowder(selectedPowder);
        }
      }
    </script>
  </body>
</html>
